<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal — Tourist Point Vendors</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ── Paste your Supabase details here ──────────────────────────
  const SUPABASE_URL     = 'https://ifzjwuhfrsssnzvafuzl.supabase.co';      // e.g. https://xxxx.supabase.co
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlmemp3dWhmcnNzc256dmFmdXpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NDgzMTgsImV4cCI6MjA5MzMyNDMxOH0.NmH78BGKikJGH9t1t-05jlTK5K2Mt6YxspsJIheh59k'; // anon/public key from Settings → API
  // ──────────────────────────────────────────────────────────────
</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; font-size: 14px; background: #f4f4f4; color: #111; }
  .topbar { background: #111; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .topbar h1 { font-size: 17px; font-weight: 600; }
  .topbar .sub { font-size: 12px; color: #aaa; margin-top: 2px; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 16px 18px; }
  .stat-label { font-size: 12px; color: #666; }
  .stat-val { font-size: 28px; font-weight: 600; margin-top: 4px; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar input { padding: 7px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; width: 240px; }
  .toolbar select { padding: 7px 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
  .btn { padding: 7px 16px; border-radius: 5px; border: 1px solid #ccc; background: #fff; font-size: 13px; cursor: pointer; }
  .btn:hover { background: #f0f0f0; }
  .btn-primary { background: #0077cc; color: #fff; border-color: #005fa3; }
  .btn-primary:hover { background: #005fa3; }
  .btn-danger { color: #c00; }
  .btn-danger:hover { background: #fdecea; border-color: #f44336; }
  .table-wrap { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; font-size: 12px; color: #555; font-weight: 600; background: #f8f8f8; border-bottom: 1px solid #e0e0e0; white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; vertical-align: top; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafafa; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-activity { background: #e1f5ee; color: #0f6e56; }
  .badge-rewards { background: #faeeda; color: #7a4a00; }
  .loading { text-align: center; padding: 48px; color: #888; }
  .empty { text-align: center; padding: 48px; color: #888; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: flex-start; justify-content: center; padding: 40px 16px; overflow-y: auto; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 8px; width: 100%; max-width: 620px; padding: 28px; position: relative; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: #888; }
  .modal h2 { font-size: 18px; margin-bottom: 20px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 16px; }
  .detail-item label { font-size: 11px; color: #888; display: block; margin-bottom: 2px; }
  .detail-item span { font-size: 13px; }
  .detail-section { margin-top: 18px; border-top: 1px solid #eee; padding-top: 14px; }
  .detail-section h3 { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 10px; }
  .service-item { background: #f8f8f8; border-radius: 4px; padding: 8px 10px; margin-bottom: 6px; font-size: 13px; }
  .service-item .svc-name { font-weight: 500; margin-bottom: 3px; }
  .service-item .svc-meta { color: #666; font-size: 12px; }
  a.link { color: #0077cc; text-decoration: none; }
  a.link:hover { text-decoration: underline; }
  @media (max-width: 700px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar h1" style="font-size:17px;font-weight:600;">Tourist Point — Vendor Portal</div>
    <div class="sub">Admin view · All submissions</div>
  </div>
  <button class="btn btn-primary" onclick="exportCSV()">Export CSV</button>
</div>

<div class="wrap">
  <div class="stats">
    <div class="stat"><div class="stat-label">Total vendors</div><div class="stat-val" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Activity vendors</div><div class="stat-val" id="s-activity">—</div></div>
    <div class="stat"><div class="stat-label">Rewards vendors</div><div class="stat-val" id="s-rewards">—</div></div>
    <div class="stat"><div class="stat-label">This week</div><div class="stat-val" id="s-week">—</div></div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search name, email, business…" oninput="applyFilters()">
    <select id="type-filter" onchange="applyFilters()">
      <option value="">All types</option>
      <option value="activity">Activity vendors</option>
      <option value="rewards">Rewards vendors</option>
    </select>
    <button class="btn" onclick="loadData()">Refresh</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Type</th>
          <th>Vendor name</th>
          <th>Business name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Location</th>
          <th>Submitted</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="table-body">
        <tr><td colspan="9" class="loading">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Detail modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allVendors = [];
let filtered = [];

async function loadData() {
  document.getElementById('table-body').innerHTML = '<tr><td colspan="9" class="loading">Loading…</td></tr>';
  const { data, error } = await db.from('vendors').select('*').order('created_at', { ascending: false });
  if (error) {
    document.getElementById('table-body').innerHTML = `<tr><td colspan="9" class="empty" style="color:#c00">Error: ${error.message}</td></tr>`;
    return;
  }
  allVendors = data || [];
  updateStats();
  applyFilters();
}

function updateStats() {
  const now = new Date();
  const weekAgo = new Date(now - 7 * 86400000);
  document.getElementById('s-total').textContent = allVendors.length;
  document.getElementById('s-activity').textContent = allVendors.filter(v => v.type === 'activity').length;
  document.getElementById('s-rewards').textContent = allVendors.filter(v => v.type === 'rewards').length;
  document.getElementById('s-week').textContent = allVendors.filter(v => new Date(v.created_at) >= weekAgo).length;
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const t = document.getElementById('type-filter').value;
  filtered = allVendors.filter(v => {
    if (t && v.type !== t) return false;
    if (q) {
      return (v.vendor_name||'').toLowerCase().includes(q) ||
             (v.business_name||'').toLowerCase().includes(q) ||
             (v.email||'').toLowerCase().includes(q) ||
             (v.location||'').toLowerCase().includes(q);
    }
    return true;
  });
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty">No vendors found.</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map((v, i) => `
    <tr>
      <td style="color:#aaa;font-size:12px">${i + 1}</td>
      <td><span class="badge badge-${v.type}">${v.type === 'activity' ? 'Activity' : 'Rewards'}</span></td>
      <td><strong>${esc(v.vendor_name)}</strong></td>
      <td>${esc(v.business_name || '—')}</td>
      <td><a class="link" href="mailto:${esc(v.email)}">${esc(v.email || '—')}</a></td>
      <td>${esc(v.phone || '—')}</td>
      <td>${esc(v.location || '—')}</td>
      <td style="white-space:nowrap">${fmtDate(v.created_at)}</td>
      <td style="white-space:nowrap">
        <button class="btn" onclick="viewDetail(${v.id})" style="padding:4px 10px;font-size:12px;">View</button>
        <button class="btn btn-danger" onclick="deleteVendor(${v.id})" style="padding:4px 10px;font-size:12px;margin-left:4px;">Delete</button>
      </td>
    </tr>
  `).join('');
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function viewDetail(id) {
  const v = allVendors.find(x => x.id === id);
  if (!v) return;
  const isRewards = v.type === 'rewards';
  const services = v.services || [];
  const socials = v.socials || [];
  const businesses = v.businesses || [];

  let html = `
    <h2>${esc(v.vendor_name)} <span class="badge badge-${v.type}" style="font-size:13px;vertical-align:middle">${isRewards ? 'Rewards' : 'Activity'}</span></h2>
    <div class="detail-grid">
      <div class="detail-item"><label>Email</label><span>${v.email ? `<a class="link" href="mailto:${esc(v.email)}">${esc(v.email)}</a>` : '—'}</span></div>
      <div class="detail-item"><label>Phone</label><span>${esc(v.phone || '—')}</span></div>
      <div class="detail-item"><label>Business name</label><span>${esc(v.business_name || '—')}</span></div>
      <div class="detail-item"><label>Location</label><span>${esc(v.location || '—')}</span></div>
      <div class="detail-item"><label>Country</label><span>${esc(v.country || '—')}</span></div>
      <div class="detail-item"><label>Address</label><span>${esc(v.address || '—')}</span></div>
      <div class="detail-item"><label>Website</label><span>${v.website ? `<a class="link" href="${esc(v.website)}" target="_blank">${esc(v.website)}</a>` : '—'}</span></div>
      <div class="detail-item"><label>Submitted</label><span>${fmtDate(v.created_at)}</span></div>
    </div>`;

  if (v.logo_url || v.photos_url || v.videos_url) {
    html += `<div class="detail-section"><h3>Media links</h3>
      <div class="detail-grid">
        ${v.logo_url ? `<div class="detail-item"><label>Logo</label><span><a class="link" href="${esc(v.logo_url)}" target="_blank">Open link</a></span></div>` : ''}
        ${v.photos_url ? `<div class="detail-item"><label>Photos</label><span><a class="link" href="${esc(v.photos_url)}" target="_blank">Open link</a></span></div>` : ''}
        ${v.videos_url ? `<div class="detail-item"><label>Videos</label><span><a class="link" href="${esc(v.videos_url)}" target="_blank">Open link</a></span></div>` : ''}
      </div></div>`;
  }

  if (services.length) {
    html += `<div class="detail-section"><h3>Services offered</h3>`;
    services.forEach(s => {
      html += `<div class="service-item"><div class="svc-name">${esc(s.name)}</div><div class="svc-meta">${esc(s.price)} · ${esc(s.hours)} · Min ${esc(s.min_persons)} persons</div></div>`;
    });
    html += `</div>`;
  }

  if (isRewards && businesses.length) {
    html += `<div class="detail-section"><h3>Businesses (${businesses.length})</h3>`;
    businesses.forEach((b, i) => {
      html += `<div style="border:1px solid #eee;border-radius:5px;padding:12px;margin-bottom:10px;">
        <strong>${esc(b.name)}</strong> — ${esc(b.location)}<br>
        ${b.address ? `<span style="font-size:12px;color:#888">${esc(b.address)}</span><br>` : ''}`;
      if (b.offers && b.offers.length) {
        html += `<div style="margin-top:8px;font-size:12px;color:#555;font-weight:500;">Offers:</div>`;
        b.offers.forEach(o => { html += `<div style="font-size:12px;margin-top:3px;">• ${esc(o.type)}: ${esc(o.description)} — ${esc(o.hours)}</div>`; });
      }
      if (b.website) html += `<div style="margin-top:6px;font-size:12px"><a class="link" href="${esc(b.website)}" target="_blank">${esc(b.website)}</a></div>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  if (socials.length) {
    html += `<div class="detail-section"><h3>Social media</h3>`;
    socials.forEach(s => { html += `<div style="font-size:13px;margin-bottom:4px;"><strong>${esc(s.platform)}:</strong> ${esc(s.handle)}</div>`; });
    html += `</div>`;
  }

  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

async function deleteVendor(id) {
  if (!confirm('Delete this vendor submission? This cannot be undone.')) return;
  const { error } = await db.from('vendors').delete().eq('id', id);
  if (error) { alert('Delete failed: ' + error.message); return; }
  allVendors = allVendors.filter(v => v.id !== id);
  updateStats();
  applyFilters();
}

function exportCSV() {
  if (!allVendors.length) { alert('No data to export.'); return; }
  const cols = ['id','type','vendor_name','business_name','email','phone','location','country','address','logo_url','photos_url','videos_url','website','created_at'];
  const headers = ['ID','Type','Vendor Name','Business Name','Email','Phone','Location','Country','Address','Logo URL','Photos URL','Videos URL','Website','Submitted At'];
  const rows = allVendors.map(v => cols.map(c => {
    const val = c === 'services' || c === 'socials' || c === 'businesses' ? JSON.stringify(v[c] || []) : (v[c] || '');
    return `"${String(val).replace(/"/g,'""')}"`;
  }));
  const csv = [headers.map(h => `"${h}"`), ...rows].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `tourist-point-vendors-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

loadData();
</script>
</body>
</html>
